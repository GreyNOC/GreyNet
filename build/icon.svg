<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- GreyNet app icon - "Voidframe Slate" orbital network mark -->
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="114"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#10161f"/>
      <stop offset="0.5" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#07090d"/>
    </linearGradient>
    <radialGradient id="skyglow" cx="0.72" cy="0.26" r="0.9">
      <stop offset="0" stop-color="#5fb3ff" stop-opacity="0.17"/>
      <stop offset="0.45" stop-color="#5fb3ff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#5fb3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fb3ff" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#3f7fc4" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#5fb3ff"/>
      <stop offset="0.82" stop-color="#8fd0ff"/>
      <stop offset="1" stop-color="#5fb3ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2c5e93"/>
      <stop offset="0.55" stop-color="#5fb3ff"/>
      <stop offset="1" stop-color="#9fd4ff"/>
    </linearGradient>
    <radialGradient id="haloAzure">
      <stop offset="0" stop-color="#5fb3ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5fb3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGreen">
      <stop offset="0" stop-color="#6fcf97" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6fcf97" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloPurple">
      <stop offset="0" stop-color="#b388eb" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#b388eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#skyglow)"/>

    <!-- faint starfield -->
    <g fill="#cfe6ff">
      <circle cx="92" cy="96" r="2.4" fill-opacity="0.28"/>
      <circle cx="180" cy="64" r="1.8" fill-opacity="0.2"/>
      <circle cx="330" cy="110" r="2" fill-opacity="0.22"/>
      <circle cx="440" cy="170" r="1.8" fill-opacity="0.18"/>
      <circle cx="66" cy="210" r="1.8" fill-opacity="0.18"/>
    </g>

    <!-- planet horizon arc (globe limb, low so it never tangles with the ring) -->
    <path d="M 42 480 A 300 300 0 0 1 470 480" fill="none"
          stroke="#5fb3ff" stroke-opacity="0.12" stroke-width="46" stroke-linecap="round"/>
    <path d="M 42 480 A 300 300 0 0 1 470 480" fill="none"
          stroke="url(#horizon)" stroke-width="20" stroke-linecap="round"/>

    <!-- orbital ring: the single bold motif -->
    <g transform="rotate(-14 256 300)">
      <ellipse cx="256" cy="300" rx="190" ry="60" fill="none"
               stroke="#5fb3ff" stroke-opacity="0.15" stroke-width="32"/>
      <ellipse cx="256" cy="300" rx="190" ry="60" fill="none"
               stroke="url(#ringGrad)" stroke-width="16"/>
    </g>

    <!-- constellation links -->
    <g stroke="#8fd0ff" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round">
      <line x1="408" y1="231" x2="368" y2="412"/>
      <line x1="408" y1="231" x2="115" y2="291"/>
      <line x1="115" y1="291" x2="104" y2="369"/>
    </g>

    <!-- node: primary azure (on ring, upper right) -->
    <circle cx="408" cy="231" r="52" fill="url(#haloAzure)"/>
    <circle cx="408" cy="231" r="24" fill="#5fb3ff"/>
    <circle cx="408" cy="231" r="11" fill="#eaf6ff" fill-opacity="0.95"/>

    <!-- node: secondary azure (on ring, left) -->
    <circle cx="115" cy="291" r="30" fill="url(#haloAzure)"/>
    <circle cx="115" cy="291" r="13.5" fill="#5fb3ff"/>
    <circle cx="115" cy="291" r="5.5" fill="#dff0ff" fill-opacity="0.9"/>

    <!-- node: green (on globe limb) -->
    <circle cx="368" cy="412" r="27" fill="url(#haloGreen)"/>
    <circle cx="368" cy="412" r="12" fill="#6fcf97"/>
    <circle cx="368" cy="412" r="5" fill="#eafff2" fill-opacity="0.85"/>

    <!-- node: purple (on ring, lower left) -->
    <circle cx="104" cy="369" r="27" fill="url(#haloPurple)"/>
    <circle cx="104" cy="369" r="12" fill="#b388eb"/>
    <circle cx="104" cy="369" r="5" fill="#f3ecff" fill-opacity="0.85"/>

    <!-- inner edge highlight -->
    <rect x="1.5" y="1.5" width="509" height="509" rx="112.5" fill="none"
          stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>
  </g>
</svg>
