# gitleaks config for GreyNet
# https://github.com/gitleaks/gitleaks
title = "GreyNet gitleaks config"

[extend]
useDefault = true

# Project-specific patterns: catch API keys committed by accident even if
# they slip past the default regex set.
[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[a-zA-Z0-9_-]{30,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(proj-)?[A-Za-z0-9_-]{20,}'''
tags = ["key", "openai"]

[[rules]]
id = "google-maps-api-key"
description = "Google Maps API key (browser key)"
regex = '''AIza[0-9A-Za-z_-]{35}'''
tags = ["key", "google"]

[allowlist]
description = "Paths and patterns that are safe to skip"
paths = [
  '''node_modules/''',
  '''dist/''',
  '''package-lock\.json''',
  '''.*\.png$''',
  '''.*\.jpg$''',
  '''.*\.webp$''',
]
# Don't flag the literal placeholders / examples in the source
regexes = [
  '''sk-ant-api03-DEMO''',
  '''AIzaSyDEMO''',
]
