name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run to catch newly-disclosed advisories on a stable branch.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit + custom security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high

      - name: Custom security audit
        run: npm run security:audit

  syntax:
    name: app.js / main.js / preload.js parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # GreyNet ships as an Electron app — no bundler. Run Node's syntax
      # check on each renderer/main source so a typo can't silently ship.
      - name: Parse main.js
        run: node --check main.js
      - name: Parse preload.js
        run: node --check preload.js
      - name: Parse constants.js
        run: node --check constants.js
      - name: Parse state.js
        run: node --check state.js
      - name: Parse app.js
        run: node --check app.js
      - name: Parse scripts/security-audit.js
        run: node --check scripts/security-audit.js

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action calls GET /repos/.../pulls/{n}/commits on PR events;
      # without pull-requests:read it hard-errors with 403 on every PR.
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
