name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run to catch newly-disclosed advisories on a stable branch.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # verify: the canonical gate — npm ci → check → security:audit.
  # Runs on Ubuntu (canonical) and Windows (GreyNet ships as a Windows app, so
  # we exercise the tooling there too). No secrets required.
  # ---------------------------------------------------------------------------
  verify:
    name: check + security audit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # --ignore-scripts: don't run package postinstall (e.g. the Electron
      # binary download) — none of check/audit need it, and it's safer + faster.
      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      - name: Syntax check (npm run check)
        run: npm run check

      # security:audit = `npm audit --audit-level=high` (blocking) + the custom
      # static audit (Electron hardening flags, IPC exposure, provider-call
      # isolation, CSP/script allowlist, eval/new Function, etc.).
      - name: Security audit (npm run security:audit)
        run: npm run security:audit

      # Moderate advisories are surfaced for triage but do not block the build,
      # so a low-risk transitive advisory can't halt a release.
      - name: npm audit (moderate, advisory)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # SBOM is a build artifact, not a gate — generate + upload from Ubuntu only.
      - name: Generate SBOM (CycloneDX)
        if: runner.os == 'Linux'
        run: npm run sbom

      - name: Upload SBOM artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # test: Playwright suite. The renderer is pure browser code, served statically
  # and driven via Chromium — no Electron binary required. Ubuntu is the
  # canonical run; Windows is included since the product targets Windows.
  # ---------------------------------------------------------------------------
  test:
    name: playwright (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      # --with-deps installs the OS libraries Chromium needs (Linux only); on
      # Windows those libraries ship with the OS, so install the browser alone.
      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium (Windows)
        if: runner.os == 'Windows'
        run: npx playwright install chromium

      # CI=true is set by Actions, so playwright.config starts its OWN static
      # server (reuseExistingServer:false) and enables one retry. The server is
      # `python -m http.server 8765`; both hosted runners ship `python`.
      - name: Run Playwright tests
        run: npm test

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action calls GET /repos/.../pulls/{n}/commits on PR events;
      # without pull-requests:read it hard-errors with 403 on every PR.
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
